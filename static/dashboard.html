<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Water Quality Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header h1 span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #4CAF50;
            color: white;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: opacity 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Result Card */
        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .quality-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2em;
            margin: 10px 0;
        }

        .quality-Potable { background: #4CAF50; color: white; }
        .quality-Acceptable { background: #FFC107; color: #333; }
        .quality-Polluée { background: #FF9800; color: white; }
        .quality-Dangereuse { background: #F44336; color: white; }

        .confidence-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin: 15px 0;
        }

        .confidence-fill {
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 0.5s ease;
        }

        .analysis-list {
            list-style: none;
            margin-top: 15px;
        }

        .analysis-list li {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }

        /* History Table */
        .history-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f5f5f5;
            font-weight: bold;
            color: #333;
        }

        tr:hover {
            background: #f9f9f9;
        }

        /* Stats */
        .stat-box {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            margin: 10px 0;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🌊 <span>Smart Water Quality</span> Dashboard</h1>
            <p>Système de Classification de la Qualité de l'Eau</p>
            <div class="status-badge" id="statusBadge">🟢 API Connectée</div>
        </div>

        <div class="grid">
            <!-- Input Card -->
            <div class="card">
                <div class="card-title">📊 Entrez les mesures des capteurs</div>
                <form id="predictionForm">
                    <div class="form-group">
                        <label>🌡️ Température (°C) [0-40]</label>
                        <input type="number" id="temperature" step="0.1" value="22.5" required>
                    </div>
                    <div class="form-group">
                        <label>🧪 pH [0-14]</label>
                        <input type="number" id="ph" step="0.1" value="7.2" required>
                    </div>
                    <div class="form-group">
                        <label>💧 Turbidité (NTU) [0-100]</label>
                        <input type="number" id="turbidity" step="0.1" value="3.5" required>
                    </div>
                    <div class="form-group">
                        <label>🫧 Oxygène dissous (mg/L) [0-15]</label>
                        <input type="number" id="dissolved_oxygen" step="0.1" value="7.8" required>
                    </div>
                    <div class="form-group">
                        <label>⚡ Conductivité (µS/cm) [0-2000]</label>
                        <input type="number" id="conductivity" step="1" value="450" required>
                    </div>
                    <button type="submit" class="btn">🔮 Prédire la qualité</button>
                </form>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Analyse en cours...</p>
                </div>

                <div id="result"></div>
            </div>

            <!-- Quick Tests Card -->
            <div class="card">
                <div class="card-title">⚡ Tests rapides</div>
                <button class="btn" onclick="quickTest('potable')" style="background: #4CAF50; margin-bottom: 10px;">💧 Eau Potable</button>
                <button class="btn" onclick="quickTest('polluted')" style="background: #FF9800; margin-bottom: 10px;">⚠️ Eau Polluée</button>
                <button class="btn" onclick="quickTest('dangerous')" style="background: #F44336;">🔴 Eau Dangereuse</button>

                <div class="stat-box" style="margin-top: 20px;">
                    <div class="stat-number" id="predictionCount">0</div>
                    <div class="stat-label">Prédictions totales</div>
                </div>
            </div>
        </div>

        <!-- History Card -->
        <div class="card">
            <div class="card-title">📜 Historique des prédictions</div>
            <div class="history-table">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Heure</th>
                            <th>Temp</th>
                            <th>pH</th>
                            <th>Turbidité</th>
                            <th>Oxygène</th>
                            <th>Qualité</th>
                            <th>Confiance</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="7" style="text-align: center;">Aucune prédiction encore</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000';
        let predictionsHistory = [];
        let totalPredictions = 0;

        // Mettre à jour les stats
        async function updateStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                totalPredictions = data.total_predictions;
                document.getElementById('predictionCount').innerText = totalPredictions;
            } catch (error) {
                console.error('Erreur stats:', error);
            }
        }

        // Afficher le résultat
        function displayResult(data) {
            const prediction = data.prediction;
            const qualityClass = prediction.class_name;
            
            let qualityColor = '';
            if (qualityClass === 'Potable') qualityColor = '#4CAF50';
            else if (qualityClass === 'Acceptable') qualityColor = '#FFC107';
            else if (qualityClass === 'Polluée') qualityColor = '#FF9800';
            else qualityColor = '#F44336';

            const html = `
                <div class="result-card">
                    <h3>📊 Résultat de l'analyse</h3>
                    <div class="quality-badge quality-${qualityClass}" style="background: ${qualityColor}">
                        ${prediction.color} ${qualityClass}
                    </div>
                    <p><strong>⚠️ Niveau de risque:</strong> ${prediction.risk_level}</p>
                    <p><strong>🎯 Action recommandée:</strong> ${prediction.action}</p>
                    
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${prediction.confidence}%; background: ${qualityColor}">
                            ${prediction.confidence}% confiance
                        </div>
                    </div>
                    
                    <p><strong>📈 Score de pollution:</strong> ${prediction.score}/12</p>
                    
                    <strong>🔍 Analyse détaillée:</strong>
                    <ul class="analysis-list">
                        ${prediction.analysis.map(a => `<li>${a}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            document.getElementById('result').innerHTML = html;
        }

        // Ajouter à l'historique
        function addToHistory(data) {
            const prediction = data.prediction;
            const timestamp = new Date(data.timestamp).toLocaleTimeString();
            
            const row = `
                <tr>
                    <td>${timestamp}</td>
                    <td>${data.input_data.temperature}°C</td>
                    <td>${data.input_data.ph}</td>
                    <td>${data.input_data.turbidity} NTU</td>
                    <td>${data.input_data.dissolved_oxygen} mg/L</td>
                    <td style="color: ${prediction.class_name === 'Potable' ? '#4CAF50' : prediction.class_name === 'Dangereuse' ? '#F44336' : '#FF9800'}; font-weight: bold;">
                        ${prediction.class_name}
                    </td>
                    <td>${prediction.confidence}%</td>
                </tr>
            `;
            
            predictionsHistory.unshift(row);
            if (predictionsHistory.length > 10) predictionsHistory.pop();
            
            if (predictionsHistory.length === 0) {
                document.getElementById('historyBody').innerHTML = '<tr><td colspan="7" style="text-align: center;">Aucune prédiction encore</td></tr>';
            } else {
                document.getElementById('historyBody').innerHTML = predictionsHistory.join('');
            }
        }

        // Faire une prédiction
        async function makePrediction(data) {
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            
            loading.style.display = 'block';
            resultDiv.innerHTML = '';
            
            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    throw new Error('Erreur API');
                }
                
                const result = await response.json();
                displayResult(result);
                addToHistory(result);
                updateStats();
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result-card" style="background: #ffebee; color: #c62828;">
                        <h3>❌ Erreur</h3>
                        <p>Impossible de contacter l'API. Vérifiez que le serveur est démarré.</p>
                        <p>Détail: ${error.message}</p>
                    </div>
                `;
            } finally {
                loading.style.display = 'none';
            }
        }

        // Tests rapides
        function quickTest(type) {
            let data;
            if (type === 'potable') {
                data = {
                    temperature: 15.0,
                    ph: 7.1,
                    turbidity: 1.2,
                    dissolved_oxygen: 8.5,
                    conductivity: 280
                };
            } else if (type === 'polluted') {
                data = {
                    temperature: 28.5,
                    ph: 8.7,
                    turbidity: 22.5,
                    dissolved_oxygen: 2.8,
                    conductivity: 1100
                };
            } else {
                data = {
                    temperature: 36.0,
                    ph: 9.8,
                    turbidity: 58.3,
                    dissolved_oxygen: 0.6,
                    conductivity: 1850
                };
            }
            
            // Remplir le formulaire
            document.getElementById('temperature').value = data.temperature;
            document.getElementById('ph').value = data.ph;
            document.getElementById('turbidity').value = data.turbidity;
            document.getElementById('dissolved_oxygen').value = data.dissolved_oxygen;
            document.getElementById('conductivity').value = data.conductivity;
            
            // Faire la prédiction
            makePrediction(data);
        }

        // Formulaire submission
        document.getElementById('predictionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const data = {
                temperature: parseFloat(document.getElementById('temperature').value),
                ph: parseFloat(document.getElementById('ph').value),
                turbidity: parseFloat(document.getElementById('turbidity').value),
                dissolved_oxygen: parseFloat(document.getElementById('dissolved_oxygen').value),
                conductivity: parseFloat(document.getElementById('conductivity').value)
            };
            
            makePrediction(data);
        });

        // Vérifier la connexion API
        async function checkAPI() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    document.getElementById('statusBadge').innerHTML = '🟢 API Connectée';
                    document.getElementById('statusBadge').style.background = '#4CAF50';
                    updateStats();
                } else {
                    throw new Error();
                }
            } catch (error) {
                document.getElementById('statusBadge').innerHTML = '🔴 API Déconnectée';
                document.getElementById('statusBadge').style.background = '#F44336';
            }
        }

        // Initialiser
        checkAPI();
        setInterval(checkAPI, 5000);
    </script>
</body>
</html>
