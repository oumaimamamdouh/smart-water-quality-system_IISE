<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Water Quality - Connexion Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Oceanic Gradient */
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            /* Glassmorphism */
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h2 {
            color: #0d47a1;
            margin-bottom: 5px;
            font-weight: 600;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00b4db;
            box-shadow: 0 0 0 3px rgba(0, 180, 219, 0.2);
        }

        .login-btn {
            background: linear-gradient(135deg, #1a73e8 0%, #00b4db 100%);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4);
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="icon">🌊</div>
        <h2>Smart Water Quality</h2>
        <p>Espace Administrateur</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="Entrez 'admin'" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="Entrez 'admin123'" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Se connecter</button>
            <div id="errorMsg" class="error-message">Identifiants incorrects. Veuillez réessayer.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Logique de présentation : Vérification simple
            if(user === 'admin' && pass === 'admin123') {
                errorMsg.style.display = 'none';
                // Redirection vers le vrai dashboard
                window.location.href = '/dashboard';
            } else {
                errorMsg.style.display = 'block';
                // Petit effet de secousse
                const container = document.querySelector('.login-container');
                container.style.transform = 'translateX(-10px)';
                setTimeout(() => container.style.transform = 'translateX(10px)', 100);
                setTimeout(() => container.style.transform = 'translateX(0)', 200);
            }
        });
    </script>
</body>
</html>
